# MultiQC Configuration for Nanopore Viral Surveillance Pipeline

title: "Nanopore Viral Surveillance - QC Report"
subtitle: "Pathogen Monitoring Pipeline"
intro_text: >
  This report summarises quality control metrics from the nanopore viral
  genome identification pipeline. It covers raw read quality, post-trimming
  statistics, host depletion efficiency, and taxonomic classification results.

report_comment: "Generated by the Nanopore Viral Surveillance Nextflow pipeline"

# Report sections order
module_order:
  - nanostat:
      name: "NanoStat - Read Statistics"
      info: "Summary statistics for raw and filtered nanopore reads"
  - nanoplot:
      name: "NanoPlot - Read Quality Plots"
      info: "Visual QC plots for nanopore read length and quality distributions"
  - samtools:
      name: "Samtools - Host Depletion"
      info: "Alignment statistics showing proportion of host vs viral reads"
  - kraken2:
      name: "Kraken2 - Taxonomic Classification"
      info: "Taxonomic classification results for viral read identification"
  - bracken:
      name: "Bracken - Abundance Estimation"
      info: "Re-estimated species-level abundances from Kraken2 reports"
  - custom_content:
      name: "Pathogen Coverage - Top Pathogens"
      info: "Genome coverage statistics for the top identified viral pathogens"

# Custom section for pipeline summary
custom_data:
  pipeline_summary:
    id: "pipeline_summary"
    section_name: "Pipeline Summary"
    description: "Overview of the nanopore viral surveillance pipeline run"
    plot_type: "generalstats"

# Table column configuration
table_columns_visible:
  NanoStat:
    number_of_reads: True
    number_of_bases: True
    median_read_length: True
    mean_read_length: True
    read_length_stdev: True
    n50_read_length: True
    mean_qual: True
    median_qual: True
  Samtools:
    flagstat_total: True
    mapped_passed: True
    mapped_passed_pct: True

# Colour scheme
custom_plot_config:
  nanostat_read_lengths:
    colors:
      raw: '#1f77b4'
      filtered: '#2ca02c'

# Thresholds for pass/fail highlighting
table_cond_formatting_rules:
  mean_qual:
    pass:
      - gt: 10
    warn:
      - lt: 10
    fail:
      - lt: 8
  mapped_passed_pct:
    pass:
      - lt: 50    # <50% host mapping = good (more viral reads)
    warn:
      - gt: 50
    fail:
      - gt: 90    # >90% host = very little viral content
  mean_coverage:
    pass:
      - gt: 20    # >20x coverage is good for viral genomes
    warn:
      - lt: 20
    fail:
      - lt: 5     # <5x is insufficient for reliable consensus

# Output settings
export_plots: true
plots_force_interactive: false
max_table_rows: 1000

# Ignore patterns
fn_ignore_files:
  - "*.bam"
  - "*.fastq*"
  - "*.fasta"
  - "versions.yml"

# Logging
log_filesize_limit: 50000000
